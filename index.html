<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IES ProjectPulse</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --navy: #0d2137; --blue: #1a4f8a; --mid: #2a6fc1; --accent: #f0a500;
  --steel: #4a6fa5; --light: #e8f0fa; --bg: #f0f4f9; --white: #ffffff;
  --text: #1a2333; --muted: #6b7a94; --border: #cdd7e8; --success: #1a9e5f;
  --error: #c0392b; --card: #ffffff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);}
header{background:linear-gradient(135deg,var(--navy) 0%,var(--blue) 60%,var(--mid) 100%);padding:0;position:relative;overflow:hidden;}
.header-inner{position:relative;display:flex;align-items:center;justify-content:space-between;padding:18px 32px;max-width:1100px;margin:0 auto;}
.logo-badge{background:var(--accent);color:var(--navy);font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:15px;letter-spacing:1px;padding:6px 12px;border-radius:4px;text-transform:uppercase;}
.container{max-width:800px;margin:0 auto;padding:32px 20px;}
.form-card{background:var(--card);border-radius:14px;box-shadow:0 4px 24px rgba(13,33,55,0.10);overflow:hidden;}
.form-card-header{background:linear-gradient(90deg,var(--navy),var(--blue));padding:20px 28px;}
.form-card-header h2{color:var(--white);font-family:'Barlow Condensed',sans-serif;font-size:22px;}
.form-body{padding:24px 28px 28px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-weight:600;margin-bottom:6px;text-transform:uppercase;}
.field input, .field select, .field textarea {
  width:100%;padding:12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;
}
.btn-submit{width:100%;padding:14px;background:var(--accent);color:var(--navy);border:none;border-radius:8px;font-weight:700;cursor:pointer;text-transform:uppercase;}
.success-screen{display:none;text-align:center;padding:40px;}
.success-screen.show{display:block;}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-badge">IES Internal</div>
    <div style="color:white; font-family:'Barlow Condensed'"><h1>ProjectPulse</h1></div>
  </div>
</header>

<div class="container">
  <div class="form-card">
    <div class="form-card-header">
      <h2>Submission Terminal</h2>
      <p style="color:rgba(255,255,255,0.6); font-size:12px">Structural Intake System</p>
    </div>

    <form id="projectPulseForm" action="https://formspree.io/f/xdawapen" method="POST">
      <div class="form-body" id="formBody">
        
        <div class="field">
          <label>Client Name / Entity</label>
          <input type="text" name="Client_Name" required placeholder="Enter full name">
        </div>

        <div class="field">
          <label>Project Division</label>
          <select name="Division" required>
            <option value="Mining">Mining</option>
            <option value="Industrial">Industrial</option>
            <option value="Infrastructure">Infrastructure</option>
          </select>
        </div>

        <div class="field">
          <label>Operational Priority</label>
          <select name="Priority">
            <option value="Standard">Standard</option>
            <option value="Urgent">Urgent / Immediate</option>
          </select>
        </div>

        <div class="field">
          <label>System Notes / Remarks</label>
          <textarea name="Notes" placeholder="Describe the structural requirements..."></textarea>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Execute Submission</button>
      </div>
    </form>

    <div class="success-screen" id="successScreen">
      <div style="font-size:50px; color:var(--success)">✓</div>
      <h3>Submission Encoded</h3>
      <p>The data packet has reached the repository.</p>
      <button onclick="location.reload()" class="clear-btn" style="cursor:pointer; margin-top:10px; padding:5px 10px">Reset Terminal</button>
    </div>
  </div>
</div>

<script>
  const form = document.getElementById("projectPulseForm");
  const formBody = document.getElementById("formBody");
  const successScreen = document.getElementById("successScreen");
  const submitBtn = document.getElementById("submitBtn");

  form.addEventListener("submit", async function(event) {
    event.preventDefault(); // Stop page reload
    
    submitBtn.innerText = "Transmitting...";
    submitBtn.disabled = true;

    const formData = new FormData(form);

    try {
      const response = await fetch(form.action, {
        method: "POST",
        body: formData,
        headers: {
          'Accept': 'application/json'
        }
      });

      if (response.ok) {
        formBody.style.display = "none";
        successScreen.classList.add("show");
      } else {
        const errorData = await response.json();
        alert("Structural Failure: " + (errorData.error || "Unknown Error"));
        submitBtn.innerText = "Retry Submission";
        submitBtn.disabled = false;
      }
    } catch (error) {
      alert("Network Latency: Request timed out.");
      submitBtn.innerText = "Retry Submission";
      submitBtn.disabled = false;
    }
  });
</script>

</body>
</html>
